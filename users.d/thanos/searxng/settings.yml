use_default_settings: true

general:
  instance_name: "My SearXNG"

search:
  safe_search: 1
  autocomplete: "duckduckgo"
  default_lang: "en-GB"
  languages:
    - "en-GB"
    - "el-GR"

server:
  secret_key: "$SEARXNG_SECRET_KEY"
  bind_address: "127.0.0.1"
  port: 24652

ui:
  default_theme: simple

engines:
  - name: hister
    engine: json_engine
    shortcut: hi
    url: http://127.0.0.1:4433/search?q={query}
    results_query: documents
    url_query: url
    title_query: title
    content_query: text
    categories: [general]
    weight: 2
    timeout: 3.0

  - name: qwant
    engine: qwant
    shortcut: qw
    language: en_GB
    region: en_GB

  - name: google
    engine: google
    shortcut: go
    language: en
    region: GB

  - name: bing
    engine: bing
    shortcut: bi
    language: en-GB
    region: en-GB

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    region: uk-en

  - name: brave
    engine: brave
    shortcut: br
    language: en-GB
    region: en-GB

  - name: yahoo
    engine: yahoo
    shortcut: yh
    region: GB

  - name: startpage
    engine: startpage
    shortcut: sp
    language: english
    region: gb

  - name: mojeek
    engine: mojeek
    shortcut: mj
    region: GB

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
